# gitleaks config — secret scanning for dramatic_options.
# Extends the default ruleset; allowlists the placeholder values in .env.example
# so the template doesn't trip the scanner.
[extend]
useDefault = true

[allowlist]
description = "Allow documented placeholders, not real secrets"
paths = [
  '''\.env\.example$''',
  '''\.gitleaks\.toml$''',
  # Generator test fixtures use the corpus-coord `key` field (the (source, key, ts)
  # tuple) with synthetic identifiers; the field name "key" + a 10+char value trips
  # the default generic-api-key rule. These files are fixture-inert — no real secrets.
  '''tests/test_generator_.*\.py$''',
]
regexes = [
  '''your_alpaca_(paper_)?(key|secret)''',
  '''<[A-Z_]+>''',
  '''xxx+''',
]
