# Dashboard server defaults (§5b observability dashboard).
# PINS PORT 8502 so the dramatic_options dashboard does NOT collide with the real_options dashboard,
# which runs on the Streamlit default 8501 (its deploy.sh: `--server.port 8501`) — both can share a host.
# Localhost-only by default: the dashboard renders the whole book + the cluster map (operator-confidential),
# so it must not be exposed on a public port — override --server.address for the tailnet, or tunnel via SSH.
# Streamlit reads ./.streamlit/config.toml relative to CWD (run from the live checkout, where deploy syncs it).
[server]
port = 8502
address = "127.0.0.1"
headless = true

[browser]
gatherUsageStats = false
