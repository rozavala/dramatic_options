name: CI

on:
  push:
    branches: [main, production]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest

  test-dashboard:
    # Mirror the BOX venv: trading + dashboard deps installed TOGETHER, so a conflict from layering
    # streamlit on the pinned trading deps fails CI rather than only the live box (the box does the same
    # two-step install in deploy.sh STEP 3). Also un-skips the importorskip'd AppTest render smoke.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (trading + dashboard, combined)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt -r requirements-dashboard.txt

      - name: Tests (pytest, with streamlit present)
        run: pytest

  web-dashboard-ui:
    # The dashboard_web React/TS UI was previously tested only locally — a TS error or a red vitest could
    # not fail CI. This job runs the type-check, the unit + RTL tests, and the production build.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard_web/ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard_web/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm run test

      - name: Build (vite)
        run: npm run build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run the gitleaks BINARY directly (pinned) rather than the marketplace
      # action — gitleaks/gitleaks-action@v2 now requires a paid GITLEAKS_LICENSE
      # for org-associated repos. The binary has no such gate and matches what we
      # run locally / in pre-commit.
      - name: Scan for secrets (gitleaks)
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --no-banner --config .gitleaks.toml --redact --exit-code 1
