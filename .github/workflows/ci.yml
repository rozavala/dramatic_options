name: CI

on:
  push:
    branches: [main, production]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Run the gitleaks BINARY directly (pinned) rather than the marketplace
      # action — gitleaks/gitleaks-action@v2 now requires a paid GITLEAKS_LICENSE
      # for org-associated repos. The binary has no such gate and matches what we
      # run locally / in pre-commit.
      - name: Scan for secrets (gitleaks)
        run: |
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --no-banner --config .gitleaks.toml --redact --exit-code 1
